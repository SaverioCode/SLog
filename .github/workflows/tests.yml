name: Tests

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      container:
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  tests:
    runs-on: ${{ inputs.runner }}
    container: ${{ inputs.container || null }}

    strategy:
      fail-fast: false
      matrix:
        preset: [test-static-sync, test-static-async, test-shared-sync, test-shared-async, test-header]

    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 4

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    # Platform-specific setup

    - name: Install System Dependencies
      if: runner.os == 'Linux'
      run: |
        apt-get update
        apt-get install -y \
          cmake \
          g++ \
          git \
          python3-pip \
          python3-venv

    - name: Set up MSVC Developer Command Prompt
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    # Conan

    - name: Install Conan (Linux)
      if: runner.os == 'Linux'
      run: |
        python3 -m venv /opt/venv
        /opt/venv/bin/pip install conan
        echo "/opt/venv/bin" >> $GITHUB_PATH

    - name: Install Conan (Windows)
      if: runner.os == 'Windows'
      run: pip install conan

    - name: Install Conan (macOS)
      if: runner.os == 'macOS'
      run: pip install conan

    - name: Cache Conan Packages
      uses: actions/cache@v4
      with:
        path: ~/.conan2
        key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
        restore-keys: |
          conan-${{ runner.os }}-

    # Tests

    - name: Run Test Workflow (${{ matrix.preset }})
      run: cmake --workflow --preset ${{ matrix.preset }}

    # Examples

    - name: Build Examples
      if: matrix.preset == 'test-header'
      run: |
        cmake --preset examples
        cmake --build --preset examples
